<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindmap Viewer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    #root { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 12px; align-items: center; }
    .toolbar-label { font-size: 14px; font-weight: 600; color: #666; margin-right: 4px; }
    .separator { width: 1px; height: 28px; background: #ddd; margin: 0 8px; }
    .btn { padding: 8px 16px; border: 2px solid #ddd; border-radius: 6px; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #444; }
    .btn:hover { border-color: #999; background: #fafafa; }
    .btn.active { border-color: #4a90d9; background: #eef4fb; color: #2a6bb5; }
    .viewer { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 16px; text-align: center; }
    .viewer img { max-width: 100%; height: auto; }
    .filename { font-size: 12px; color: #999; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const THEMES = ["classic", "midnight", "ember", "safari"];
    const STYLES = ["organic", "angular"];
    const LAYOUTS = ["horizontal", "vertical"];

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function App() {
      const [theme, setTheme] = React.useState("classic");
      const [style, setStyle] = React.useState("organic");
      const [layout, setLayout] = React.useState("horizontal");

      const filename = `community_mindmap_${theme}_${style}_${layout}.svg`;

      return (
        <div>
          <div className="toolbar">
            <span className="toolbar-label">Theme:</span>
            {THEMES.map(t => (
              <button key={t} className={`btn ${theme === t ? "active" : ""}`}
                onClick={() => setTheme(t)}>{capitalize(t)}</button>
            ))}
            <div className="separator" />
            <span className="toolbar-label">Style:</span>
            {STYLES.map(s => (
              <button key={s} className={`btn ${style === s ? "active" : ""}`}
                onClick={() => setStyle(s)}>{capitalize(s)}</button>
            ))}
            <div className="separator" />
            <span className="toolbar-label">Layout:</span>
            {LAYOUTS.map(l => (
              <button key={l} className={`btn ${layout === l ? "active" : ""}`}
                onClick={() => setLayout(l)}>{capitalize(l)}</button>
            ))}
          </div>
          <div className="viewer">
            <img src={filename} alt={`${theme} ${style} ${layout}`} />
            <div className="filename">{filename}</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
